name: Train Full Dataset (2008–2026 YTD)

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - 'requirements.txt'
  workflow_dispatch:  # still manual trigger but no parameters

jobs:
  train-full:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ['fi', 'equity']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Train ${{ matrix.module }} module (full dataset)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python train.py --mode full --module ${{ matrix.module }} --epochs 150
    - name: Upload model to HF dataset
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python upload_model.py --module ${{ matrix.module }} --mode full
