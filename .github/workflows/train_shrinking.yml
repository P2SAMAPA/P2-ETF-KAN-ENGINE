name: Train Shrinking Windows (2008–2024 start years)

on:
  workflow_dispatch:   # manual trigger only

jobs:
  train-shrinking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train all shrinking windows (fi + equity, all start years)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for module in fi equity; do
            for year in 2008 2009 2010 2011 2012 2013 2014 2015 2016 2017 2018 2019 2020 2021 2022 2023 2024; do
              echo "=== Training $module module, start year $year ==="
              python train.py --mode shrinking --module $module --start-year $year --epochs 150
            done
          done

      - name: Upload all shrinking models to HF dataset repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python upload_all_shrinking.py
        # No continue-on-error — a failed upload should be visible as a red step

      - name: Upload artifacts to GitHub (backup)
        if: always()   # save artifacts even if HF upload failed
        uses: actions/upload-artifact@v4
        with:
          name: shrinking-models
          path: |
            models/
            metrics_*.pkl
          retention-days: 7
